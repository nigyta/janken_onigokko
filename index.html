<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>じゃんけん鬼ごっこ</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; height: 100vh; display: flex;
    background: #1a1a2e; color: #eee;
    font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
  }
  #sidebar {
    width: 240px; flex-shrink: 0; background: #16213e;
    padding: 16px; display: flex; flex-direction: column; gap: 14px;
  }
  h1 { font-size: 16px; margin: 0 0 4px; }
  label { font-size: 12px; color: #aaa; display: block; }
  input[type="range"] { width: 100%; }
  button {
    padding: 8px; border: none; border-radius: 6px;
    font-size: 14px; font-weight: bold; cursor: pointer;
  }
  #startBtn { background: #e94560; color: #fff; }
  #resetBtn { background: #444; color: #eee; }
  #status { margin-top: auto; display: flex; flex-direction: column; gap: 6px; }
  #timer { font-size: 18px; font-weight: bold; }
  .count { font-size: 16px; font-weight: bold; }
  .count.gu { color: #e74c3c; }
  .count.choki { color: #2ecc71; }
  .count.pa { color: #3498db; }
  #board {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px;
    padding: 16px;
  }
  #fieldWrap { position: relative; }
  canvas {
    display: block;
    background: #0f0f1a; border-radius: 8px;
    max-width: 100%;
  }
  #overlay {
    position: absolute; inset: 0;
    display: none; align-items: center; justify-content: center;
    background: rgba(0, 0, 0, 0.6);
    font-size: 36px; font-weight: bold; text-align: center;
    padding: 0 24px; overflow-wrap: anywhere; /* 狭い画面でも勝者テキストが収まるように */
  }
</style>
</head>
<body>
<div id="sidebar">
  <h1>じゃんけん鬼ごっこ</h1>
  <div>
    <label>人数 N(グループごと): <span id="nValue">10</span> 人</label>
    <input type="range" id="nSlider" min="1" max="100" value="10">
  </div>
  <div>
    <label>シミュレーション時間: <span id="durValue">60</span> 秒</label>
    <input type="range" id="durSlider" min="10" max="300" value="60">
  </div>
  <div>
    <label>平均速度: <span id="speedValue">80</span> px/秒</label>
    <input type="range" id="speedSlider" min="10" max="300" value="80">
  </div>
  <div>
    <label>速度の標準偏差: <span id="sdValue">15</span> px/秒</label>
    <input type="range" id="sdSlider" min="0" max="100" value="15">
  </div>
  <div>
    <label>障害物の数: <span id="obsValue">5</span> 個</label>
    <input type="range" id="obsSlider" min="0" max="15" value="5">
  </div>
  <button id="startBtn">スタート</button>
  <button id="resetBtn">リセット</button>
  <div id="status">
    <div id="timer">⏱ ─</div>
    <div class="count gu">✊ グー <span id="countGu">-</span> 人</div>
    <div class="count choki">✌️ チョキ <span id="countChoki">-</span> 人</div>
    <div class="count pa">✋ パー <span id="countPa">-</span> 人</div>
  </div>
</div>
<div id="board">
  <div id="fieldWrap">
    <canvas id="field" width="800" height="600"></canvas>
    <div id="overlay"></div>
  </div>
  <canvas id="graph" width="800" height="160"></canvas>
</div>

<script src="sim.js"></script>
<script>
'use strict';

// ---- Renderer ----
const EMOJI = { gu: '✊', choki: '✌️', pa: '✋' };
const COLOR = { gu: '#e74c3c', choki: '#2ecc71', pa: '#3498db' };
const NAME = { gu: 'グー', choki: 'チョキ', pa: 'パー' };

const canvas = document.getElementById('field');
const ctx = canvas.getContext('2d');
const graphCanvas = document.getElementById('graph');
const gctx = graphCanvas.getContext('2d');
const GRAPH_W = graphCanvas.width;   // 800
const GRAPH_H = graphCanvas.height;  // 160
const GRAPH_PAD = 28;                // 軸ラベル用の余白 px

function draw(sim) {
  ctx.clearRect(0, 0, FIELD_WIDTH, FIELD_HEIGHT);
  // 障害物
  ctx.fillStyle = '#2c2c54';
  ctx.strokeStyle = '#44446e';
  ctx.lineWidth = 1;
  for (const r of sim.obstacles) {
    ctx.fillRect(r.x, r.y, r.w, r.h);
    ctx.strokeRect(r.x, r.y, r.w, r.h);
  }
  ctx.font = '24px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#fff'; // 絵文字はカラーフォント描画だが、明示してプラットフォーム差異を避ける
  ctx.shadowBlur = 12;
  for (const a of sim.agents) {
    if (!a.alive) continue;
    ctx.shadowColor = COLOR[a.group]; // グループ色の光彩
    ctx.fillText(EMOJI[a.group], a.x, a.y);
  }
  ctx.shadowBlur = 0;
  ctx.shadowColor = 'transparent';
}

function drawGraph(sim) {
  gctx.clearRect(0, 0, GRAPH_W, GRAPH_H);

  const n = sim.params.n;
  const duration = sim.params.duration;
  const left = GRAPH_PAD;
  const top = GRAPH_PAD;
  const plotW = GRAPH_W - GRAPH_PAD * 2;
  const plotH = GRAPH_H - GRAPH_PAD * 2;
  const right = left + plotW;
  const bottom = top + plotH;

  // 軸(左=y軸、下=x軸)
  gctx.strokeStyle = '#2c2c54';
  gctx.lineWidth = 1;
  gctx.beginPath();
  gctx.moveTo(left, top);
  gctx.lineTo(left, bottom);
  gctx.lineTo(right, bottom);
  gctx.stroke();

  // 目盛りラベル
  gctx.fillStyle = '#888';
  gctx.font = '11px sans-serif';
  gctx.textAlign = 'right';
  gctx.textBaseline = 'middle';
  gctx.fillText(String(n), left - 6, top);    // y上端 = 初期人数 n
  gctx.fillText('0', left - 6, bottom);        // y下端 = 0
  gctx.textAlign = 'center';
  gctx.textBaseline = 'top';
  gctx.fillText('0s', left, bottom + 4);              // x左端
  gctx.fillText(duration + 's', right, bottom + 4);   // x右端

  if (n <= 0 || duration <= 0) return; // 0除算防止(折れ線は描かない)

  // グー・チョキ・パーの3本の折れ線
  for (const group of GROUPS) {
    gctx.strokeStyle = COLOR[group];
    gctx.lineWidth = 2;
    gctx.beginPath();
    sim.history.forEach((s, i) => {
      const tx = Math.min(s.t / duration, 1);             // 終了点が duration を僅かに超えても右端でクランプ
      const ry = Math.max(0, Math.min(1, s[group] / n));  // 念のため [0,1] にクランプ
      const x = left + tx * plotW;
      const y = top + (1 - ry) * plotH;                   // 上が多い
      if (i === 0) gctx.moveTo(x, y);
      else gctx.lineTo(x, y);
    });
    gctx.stroke();
  }
}

// ---- UIController ----
const $ = (id) => document.getElementById(id);

// スライダーの値表示を連動させる
const sliderPairs = [
  ['nSlider', 'nValue'],
  ['durSlider', 'durValue'],
  ['speedSlider', 'speedValue'],
  ['sdSlider', 'sdValue'],
  ['obsSlider', 'obsValue'],
];
for (const [sliderId, valueId] of sliderPairs) {
  $(sliderId).addEventListener('input', () => {
    $(valueId).textContent = $(sliderId).value;
  });
}

function readParams() {
  return {
    n: Number($('nSlider').value),
    duration: Number($('durSlider').value),
    meanSpeed: Number($('speedSlider').value),
    speedSd: Number($('sdSlider').value),
    obstacleCount: Number($('obsSlider').value),
  };
}

let sim = null;
let running = false;
let lastTime = null;
let rafId = null; // 実行中の requestAnimationFrame の ID(二重ループ防止)

function updateCounts() {
  const counts = sim.aliveCounts();
  $('countGu').textContent = counts.gu;
  $('countChoki').textContent = counts.choki;
  $('countPa').textContent = counts.pa;
}

function updateStatus() {
  updateCounts();
  $('timer').textContent = `⏱ 残り ${sim.timeLeft.toFixed(1)} 秒`;
}

function showOverlay() {
  const overlay = $('overlay');
  if (sim.winner === 'draw') {
    overlay.textContent = '引き分け';
    overlay.style.color = '#eee';
  } else {
    const counts = sim.aliveCounts();
    overlay.textContent =
      `${EMOJI[sim.winner]} ${NAME[sim.winner]}の勝ち!(残り ${counts[sim.winner]} 人)`;
    overlay.style.color = COLOR[sim.winner];
  }
  overlay.style.display = 'flex';
}

function loop(t) {
  if (!running) return;
  const dt = lastTime === null ? 0 : (t - lastTime) / 1000;
  lastTime = t;
  sim.tick(dt);
  draw(sim);
  drawGraph(sim);
  updateStatus();
  if (sim.finished) {
    running = false;
    showOverlay();
    return;
  }
  rafId = requestAnimationFrame(loop);
}

function start() {
  if (rafId !== null) cancelAnimationFrame(rafId); // 既存ループを止めて二重実行を防ぐ
  sim = new Simulation(readParams());
  running = true;
  lastTime = null;
  $('overlay').style.display = 'none';
  rafId = requestAnimationFrame(loop);
}

function reset() {
  if (rafId !== null) cancelAnimationFrame(rafId);
  running = false;
  $('overlay').style.display = 'none';
  sim = new Simulation(readParams());
  draw(sim);
  drawGraph(sim);
  updateCounts();
  $('timer').textContent = '⏱ ─'; // 開始前はタイマーを表示しない
}

$('startBtn').addEventListener('click', start);
$('resetBtn').addEventListener('click', reset);

reset(); // 初期表示(配置のみ)
</script>
</body>
</html>
